name: Build EasyMesh Packages (APK + IPK)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # =============================================
  # 任务一：使用 OpenWrt 25.12 (最新) 构建 APK 包
  # =============================================
  build-apk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          #  通用包，精简编译 
          #- target: ipq60xx-generic
          #  sdk_url: https://downloads.openwrt.org/releases/25.12.0-rc2/targets/qualcommax/ipq60xx/openwrt-sdk-25.12.0-rc2-qualcommax-ipq60xx_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/25.12.0-rc2/targets/ramips/mt7621/openwrt-sdk-25.12.0-rc2-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O sdk.tar.zst "${{ matrix.sdk_url }}"
          tar -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package source into SDK
        run: |
          cp -r luci-app-easymesh openwrt-sdk/package/

      - name: Prepare feeds configuration
        run: |
          cd openwrt-sdk
          git config --global http.postBuffer 524288000
          sed -i 's|src-git base https://git.openwrt.org/openwrt/openwrt.git|src-git base https://github.com/openwrt/openwrt.git|' feeds.conf.default

      - name: Update feeds and install LuCI
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build options
        run: |
          cd openwrt-sdk
          make defconfig
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-easymesh=y" >> .config
          echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
          echo "CONFIG_PACKAGE_batctl-default=y" >> .config
          echo "CONFIG_PACKAGE_kmod-batman-adv=y" >> .config
          echo "CONFIG_PACKAGE_dawn=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-lua-runtime=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_libiwinfo-lua=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-batman-adv=y" >> .config
          make oldconfig

      - name: Compile the package
        run: |
          cd openwrt-sdk
          make package/luci-app-easymesh/compile V=s

      - name: List built packages (APK)
        run: |
          cd openwrt-sdk
          echo "=== Built .apk files ==="
          find bin/packages/ -name "*.apk" | grep -i easymesh || echo "No easymesh apk found"

      - name: Collect generated packages (APK)
        run: |
          cd openwrt-sdk
          mkdir -p ../artifacts-apk
          find bin/packages/ -name "*easymesh*.apk" | xargs cp -t ../artifacts-apk/ || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages-${{ matrix.target }}
          path: artifacts-apk/

  # =============================================
  # 任务二：使用 OpenWrt 24.10 (稳定版) 为 MT7621 构建 IPK 包
  # =============================================
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            # ⚠️ 重要：请将下面的链接替换为实际可用的 24.10 稳定版 SDK 地址
            sdk_url: https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O sdk.tar.xz "${{ matrix.sdk_url }}"
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package source into SDK
        run: |
          cp -r luci-app-easymesh openwrt-sdk/package/

      - name: Prepare feeds configuration
        run: |
          cd openwrt-sdk
          git config --global http.postBuffer 524288000
          sed -i 's|src-git base https://git.openwrt.org/openwrt/openwrt.git|src-git base https://github.com/openwrt/openwrt.git|' feeds.conf.default

      - name: Update feeds and install LuCI
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build options
        run: |
          cd openwrt-sdk
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-easymesh=y" >> .config
          echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
          echo "CONFIG_PACKAGE_batctl-default=y" >> .config
          echo "CONFIG_PACKAGE_kmod-batman-adv=y" >> .config
          echo "CONFIG_PACKAGE_dawn=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-lua-runtime=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_libiwinfo-lua=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-batman-adv=y" >> .config
          make oldconfig

      - name: Compile the package
        run: |
          cd openwrt-sdk
          make package/luci-app-easymesh/compile V=s

      - name: List built packages (IPK)
        run: |
          cd openwrt-sdk
          echo "=== Built .ipk files ==="
          find bin/packages/ -name "*.ipk" | grep -i easymesh || echo "No easymesh ipk found"

      - name: Collect generated packages (IPK)
        run: |
          cd openwrt-sdk
          mkdir -p ../artifacts-ipk
          find bin/packages/ -name "*easymesh*.ipk" | xargs cp -t ../artifacts-ipk/ || true

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages-${{ matrix.target }}
          path: artifacts-ipk/
