name: Build EasyMesh Packages (APK + IPK)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  # =============================================
  # 任务一：使用 OpenWrt 25.12 (最新) 构建 APK 包
  # =============================================
  build-apk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/25.12.0-rc2/targets/ramips/mt7621/openwrt-sdk-25.12.0-rc2-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O sdk.tar.zst "${{ matrix.sdk_url }}"
          tar -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package source & create valid pot placeholder
        run: |
          cd openwrt-sdk
          rm -rf package/luci-app-easymesh
          cp -r ../luci-app-easymesh package/
          mkdir -p package/luci-app-easymesh/po/templates
          # 移除EOF多行语法，改用echo生成pot，彻底规避shell报错
          echo 'msgid ""' > package/luci-app-easymesh/po/templates/easymesh.pot
          echo 'msgstr ""' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Content-Type: text/plain; charset=UTF-8\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Plural-Forms: nplurals=1; plural=0;\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot
          # 注册本地feeds
          echo "src-link local $(pwd)/package" >> feeds.conf.default

      - name: Prepare feeds configuration & full feeds update once
        run: |
          cd openwrt-sdk
          git config --global http.postBuffer 524288000
          sed -i 's|src-git base https://git.openwrt.org/openwrt/openwrt.git|src-git base https://github.com/openwrt/openwrt.git|' feeds.conf.default
          # 仅一次更新全部所需源，消除重复更新警告
          ./scripts/feeds update base luci local
          ./scripts/feeds install luci-app-easymesh luci-base luci-compat luci-lua-runtime

      - name: Configure build options
        run: |
          cd openwrt-sdk
          make defconfig
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-easymesh=y" >> .config
          # 开启LuCI简体中文翻译支持
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
          echo "CONFIG_PACKAGE_batctl-default=y" >> .config
          echo "CONFIG_PACKAGE_kmod-batman-adv=y" >> .config
          echo "CONFIG_PACKAGE_dawn=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-lua-runtime=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_libiwinfo-lua=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-batman-adv=y" >> .config
          make oldconfig

      - name: Compile first then clean (fix no rule error)
        run: |
          cd openwrt-sdk
          ./scripts/feeds search luci-app-easymesh
          make package/luci-app-easymesh/compile V=s
          make package/luci-app-easymesh/clean V=s

      - name: List built packages (APK + 翻译包)
        run: |
          cd openwrt-sdk
          echo "=== 生成所有APK ==="
          find bin/packages/ -name "*easymesh*.apk" || echo "未找到easymesh相关APK"

      - name: Collect generated packages (APK + i18n翻译包)
        run: |
          cd openwrt-sdk
          mkdir -p ../artifacts-apk
          find bin/packages/ -name "*easymesh*.apk" | xargs cp -t ../artifacts-apk/ || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages-${{ matrix.target }}
          path: artifacts-apk/

  # =============================================
  # 任务二：使用 OpenWrt 24.10 (稳定版) 构建 IPK 包
  # =============================================
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O sdk.tar.xz "${{ matrix.sdk_url }}"
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package source & create valid pot placeholder
        run: |
          cd openwrt-sdk
          rm -rf package/luci-app-easymesh
          cp -r ../luci-app-easymesh package/
          mkdir -p package/luci-app-easymesh/po/templates
          echo 'msgid ""' > package/luci-app-easymesh/po/templates/easymesh.pot
          echo 'msgstr ""' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Content-Type: text/plain; charset=UTF-8\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Plural-Forms: nplurals=1; plural=0;\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo "src-link local $(pwd)/package" >> feeds.conf.default

      - name: Prepare feeds configuration & full feeds update once
        run: |
          cd openwrt-sdk
          git config --global http.postBuffer 524288000
          sed -i 's|src-git base https://git.openwrt.org/openwrt/openwrt.git|src-git base https://github.com/openwrt/openwrt.git|' feeds.conf.default
          ./scripts/feeds update base luci local
          ./scripts/feeds install luci-app-easymesh luci-base luci-compat luci-lua-runtime

      - name: Configure build options
        run: |
          cd openwrt-sdk
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-easymesh=y" >> .config
          # 开启LuCI简体中文翻译支持
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
          echo "CONFIG_PACKAGE_batctl-default=y" >> .config
          echo "CONFIG_PACKAGE_kmod-batman-adv=y" >> .config
          echo "CONFIG_PACKAGE_dawn=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE-luci-lua-runtime=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_libiwinfo-lua=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-batman-adv=y" >> .config
          make oldconfig

      - name: Compile first then clean (fix no rule error)
        run: |
          cd openwrt-sdk
          ./scripts/feeds search luci-app-easymesh
          make package/luci-app-easymesh/compile V=s
          make package/luci-app-easymesh/clean V=s

      - name: List built packages (IPK + 翻译包)
        run: |
          cd openwrt-sdk
          echo "=== 生成所有IPK ==="
          find bin/packages/ -name "*easymesh*.ipk" || echo "未找到easymesh相关IPK"

      - name: Collect generated packages (IPK + i18n翻译包)
        run: |
          cd openwrt-sdk
          mkdir -p ../artifacts-ipk
          find bin/packages/ -name "*easymesh*.ipk" | xargs cp -t ../artifacts-ipk/ || true

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages-${{ matrix.target }}
          path: artifacts-ipk/
