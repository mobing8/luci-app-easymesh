name: Build EasyMesh Packages (APK + IPK)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  # 25.12 构建APK
  build-apk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/25.12.0-rc2/targets/ramips/mt7621/openwrt-sdk-25.12.0-rc2-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Install build deps
        run: |
          sudo apt update -y
          sudo apt install -y build-essential gawk gettext unzip xz-utils zstd wget libncurses-dev libssl-dev python3

      - name: Download & extract SDK
        run: |
          TARGET_SLUG=$(echo ${{ matrix.target }} | tr '/' '-')
          wget -q "${{ matrix.sdk_url }}" -O sdk.tar.zst
          tar -xf sdk.tar.zst
          mv openwrt-sdk-* sdk
          echo TARGET_SLUG=$TARGET_SLUG >> $GITHUB_ENV

      - name: Copy plugin & generate pot
        run: |
          cd sdk
          rm -rf package/luci-app-easymesh
          cp -r ../luci-app-easymesh package/
          mkdir -p package/luci-app-easymesh/po/templates
          echo 'msgid ""' > package/luci-app-easymesh/po/templates/easymesh.pot
          echo 'msgstr ""' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Content-Type: text/plain; charset=UTF-8\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Plural-Forms: nplurals=1; plural=0;\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot

      - name: Minimal config
        run: |
          cd sdk
          make defconfig V=0
          echo CONFIG_USE_APK=y >> .config
          echo CONFIG_PACKAGE_luci-app-easymesh=y >> .config
          echo CONFIG_LUCI_LANG_zh-cn=y >> .config
          make olddefconfig V=0

      - name: Compile single package (无需feeds)
        run: |
          cd sdk
          make package/luci-app-easymesh/compile V=s IGNORE_ERRORS=m

      - name: Collect packages
        run: |
          mkdir -p output/apk
          find sdk/bin/packages -name "*easymesh*.apk" -exec cp {} output/apk/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.target }}
          path: output/apk/

  # 24.10 构建IPK
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Install build deps
        run: |
          sudo apt update -y
          sudo apt install -y build-essential gawk gettext unzip xz-utils zstd wget libncurses-dev libssl-dev python3

      - name: Download & extract SDK
        run: |
          TARGET_SLUG=$(echo ${{ matrix.target }} | tr '/' '-')
          wget -q "${{ matrix.sdk_url }}" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk
          echo TARGET_SLUG=$TARGET_SLUG >> $GITHUB_ENV

      - name: Copy plugin & generate pot
        run: |
          cd sdk
          rm -rf package/luci-app-easymesh
          cp -r ../luci-app-easymesh package/
          mkdir -p package/luci-app-easymesh/po/templates
          echo 'msgid ""' > package/luci-app-easymesh/po/templates/easymesh.pot
          echo 'msgstr ""' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Content-Type: text/plain; charset=UTF-8\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot
          echo '"Plural-Forms: nplurals=1; plural=0;\n"' >> package/luci-app-easymesh/po/templates/easymesh.pot

      - name: Minimal config
        run: |
          cd sdk
          make defconfig V=0
          echo CONFIG_PACKAGE_luci-app-easymesh=y >> .config
          echo CONFIG_LUCI_LANG_zh-cn=y >> .config
          make olddefconfig V=0

      - name: Compile single package (无需feeds)
        run: |
          cd sdk
          make package/luci-app-easymesh/compile V=s IGNORE_ERRORS=m

      - name: Collect packages
        run: |
          mkdir -p output/ipk
          find sdk/bin/packages -name "*easymesh*.ipk" -exec cp {} output/ipk/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.target }}
          path: output/ipk/
