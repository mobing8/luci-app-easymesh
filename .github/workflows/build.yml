name: Build EasyMesh Packages (APK + IPK)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  # =============================================
  # 任务一：使用 OpenWrt 25.12 (最新) 构建 APK 包
  # =============================================
  build-apk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/25.12.0-rc2/targets/ramips/mt7621/openwrt-sdk-25.12.0-rc2-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O sdk.tar.zst "${{ matrix.sdk_url }}"
          tar -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package source into SDK & Register local feeds
        run: |
          cd openwrt-sdk
          rm -rf package/luci-app-easymesh
          cp -r ../luci-app-easymesh package/
          # 注册本地package目录为local feeds
          echo "src-link local $(pwd)/package" >> feeds.conf.default
          # 更新本地feeds并安装插件，让make识别编译规则
          ./scripts/feeds update local
          ./scripts/feeds install luci-app-easymesh

      - name: Prepare feeds configuration
        run: |
          cd openwrt-sdk
          git config --global http.postBuffer 524288000
          sed -i 's|src-git base https://git.openwrt.org/openwrt/openwrt.git|src-git base https://github.com/openwrt/openwrt.git|' feeds.conf.default

      - name: Update feeds and install LuCI
        run: |
          cd openwrt-sdk
          ./scripts/feeds update base luci packages routing telephony video
          ./scripts/feeds install -a

      - name: Configure build options
        run: |
          cd openwrt-sdk
          make defconfig
          # 写入所有编译配置到临时文件，避免重复echo造成Kconfig冲突
          cat > .tmp_defcfg << 'EOT'
CONFIG_USE_APK=y
CONFIG_PACKAGE_luci-app-easymesh=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_LUCI_LANG_zh-cn=y
CONFIG_PACKAGE_kmod-cfg80211=y
CONFIG_PACKAGE_batctl-default=y
CONFIG_PACKAGE_kmod-batman-adv=y
CONFIG_PACKAGE_dawn=y
CONFIG_PACKAGE_luci-compat=y
CONFIG_PACKAGE_luci-lua-runtime=y
CONFIG_PACKAGE_bash=y
CONFIG_PACKAGE_libiwinfo-lua=y
CONFIG_PACKAGE_luci-proto-batman-adv=y
EOT
          # 标准合并配置，自动处理依赖冲突
          ./scripts/config/conf --defconfig=.tmp_defcfg
          rm -f .tmp_defcfg
          make oldconfig

      - name: Compile the package
        run: |
          cd openwrt-sdk
          # 打印检索结果，校验插件是否注册成功
          ./scripts/feeds search luci-app-easymesh
          make package/luci-app-easymesh/clean V=s
          make package/luci-app-easymesh/compile V=s

      - name: List built packages (APK + i18n translation apk)
        run: |
          cd openwrt-sdk
          echo "=== All generated APK files ==="
          find bin/packages/ -name "*.apk" | grep -i easymesh || echo "No easymesh apk found"

      - name: Collect generated packages (APK + i18n)
        run: |
          cd openwrt-sdk
          mkdir -p ../artifacts-apk
          find bin/packages/ -name "*easymesh*.apk" | xargs cp -t ../artifacts-apk/ || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages-${{ matrix.target }}
          path: artifacts-apk/

  # =============================================
  # 任务二：使用 OpenWrt 24.10 (稳定版) 构建 IPK 包
  # =============================================
  build-ipk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ramips-mt7621
            sdk_url: https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: Download and extract OpenWrt SDK
        run: |
          wget -O sdk.tar.xz "${{ matrix.sdk_url }}"
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Copy package source into SDK & Register local feeds
        run: |
          cd openwrt-sdk
          rm -rf package/luci-app-easymesh
          cp -r ../luci-app-easymesh package/
          # 注册本地package目录为local feeds
          echo "src-link local $(pwd)/package" >> feeds.conf.default
          # 更新本地feeds并安装插件，让make识别编译规则
          ./scripts/feeds update local
          ./scripts/feeds install luci-app-easymesh

      - name: Prepare feeds configuration
        run: |
          cd openwrt-sdk
          git config --global http.postBuffer 524288000
          sed -i 's|src-git base https://git.openwrt.org/openwrt/openwrt.git|src-git base https://github.com/openwrt/openwrt.git|' feeds.conf.default

      - name: Update feeds and install LuCI
        run: |
          cd openwrt-sdk
          ./scripts/feeds update base luci packages routing telephony video
          ./scripts/feeds install -a

      - name: Configure build options
        run: |
          cd openwrt-sdk
          make defconfig
          # 写入所有编译配置到临时文件，避免重复echo造成Kconfig冲突
          cat > .tmp_defcfg << 'EOT'
CONFIG_PACKAGE_luci-app-easymesh=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_LUCI_LANG_zh-cn=y
CONFIG_PACKAGE_kmod-cfg80211=y
CONFIG_PACKAGE_batctl-default=y
CONFIG_PACKAGE_kmod-batman-adv=y
CONFIG_PACKAGE_dawn=y
CONFIG_PACKAGE_luci-compat=y
CONFIG_PACKAGE_luci-lua-runtime=y
CONFIG_PACKAGE_bash=y
CONFIG_PACKAGE_libiwinfo-lua=y
CONFIG_PACKAGE_luci-proto-batman-adv=y
EOT
          # 标准合并配置，自动处理依赖冲突
          ./scripts/config/conf --defconfig=.tmp_defcfg
          rm -f .tmp_defcfg
          make oldconfig

      - name: Compile the package
        run: |
          cd openwrt-sdk
          # 打印检索结果，校验插件是否注册成功
          ./scripts/feeds search luci-app-easymesh
          make package/luci-app-easymesh/clean V=s
          make package/luci-app-easymesh/compile V=s

      - name: List built packages (IPK + i18n translation ipk)
        run: |
          cd openwrt-sdk
          echo "=== All generated IPK files ==="
          find bin/packages/ -name "*.ipk" | grep -i easymesh || echo "No easymesh ipk found"

      - name: Collect generated packages (IPK + i18n)
        run: |
          cd openwrt-sdk
          mkdir -p ../artifacts-ipk
          find bin/packages/ -name "*easymesh*.ipk" | xargs cp -t ../artifacts-ipk/ || true

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-packages-${{ matrix.target }}
          path: artifacts-ipk/
