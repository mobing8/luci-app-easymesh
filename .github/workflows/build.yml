name: Build luci-app-easymesh (IPK + APK)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'images/**'
  workflow_dispatch:

jobs:
  build-ipk:
    name: Build IPK (mt7621)
    runs-on: ubuntu-latest
    env:
      TERM: dumb
      SDK_URL: "https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-sdk-24.10.7-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
      LUCI_BRANCH: "openwrt-24.10"
      ARCH: "mipsel_24kc"

    steps:
      - name: 检出插件源码
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext git libelf-dev \
            libncurses5-dev libssl-dev python3 unzip wget rsync zstd ccache

      - name: 下载解压SDK
        run: |
          wget -q "$SDK_URL" -O sdk.tar.zst
          tar -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: 拉取LuCI源码（获取luci.mk核心宏）
        working-directory: sdk
        run: |
          sed -i '/src-git luci/d' feeds.conf.default
          echo "src-git luci https://github.com/openwrt/luci.git;$LUCI_BRANCH" >> feeds.conf.default
          ./scripts/feeds update luci
          ls -lh feeds/luci/luci.mk

      - name: 复制插件到package目录
        run: |
          cp -r luci-app-easymesh sdk/package/
          ls -lh sdk/package/luci-app-easymesh/Makefile

      - name: 生成配置并校验插件识别
        working-directory: sdk
        run: |
          echo "=== 生成默认配置 ==="
          make defconfig > /dev/null 2>&1
          
          echo ""
          echo "=== 插件识别结果 ==="
          if grep -q "CONFIG_PACKAGE_luci-app-easymesh=m" .config; then
            echo "✅ 插件识别成功"
          else
            echo "❌ 插件未被识别"
            grep -i easymesh .config || echo "未找到任何相关配置项"
            exit 1
          fi

      - name: 编译IPK包
        working-directory: sdk
        run: |
          make package/luci-app-easymesh/compile V=s -j$(nproc)

      - name: 收集产物
        run: |
          mkdir -p output/ipk
          find sdk/bin/packages -name "luci-app-easymesh*.ipk" -o -name "luci-i18n-easymesh*.ipk" | xargs -I {} cp {} output/ipk/
          ls -lh output/ipk/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-easymesh-ipk-${{ env.ARCH }}
          path: output/ipk/*.ipk

  build-apk:
    name: Build APK (mt7621)
    runs-on: ubuntu-latest
    env:
      TERM: dumb
      SDK_URL: "https://downloads.openwrt.org/releases/25.12.0-rc2/targets/ramips/mt7621/openwrt-sdk-25.12.0-rc2-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
      LUCI_BRANCH: "openwrt-25.12"
      ARCH: "mipsel_24kc"

    steps:
      - name: 检出插件源码
        uses: actions/checkout@v4
        with:
          path: luci-app-easymesh

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext git libelf-dev \
            libncurses5-dev libssl-dev python3 unzip wget rsync zstd ccache

      - name: 下载解压SDK
        run: |
          wget -q "$SDK_URL" -O sdk.tar.zst
          tar -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: 拉取LuCI源码（获取luci.mk核心宏）
        working-directory: sdk
        run: |
          sed -i '/src-git luci/d' feeds.conf.default
          echo "src-git luci https://github.com/openwrt/luci.git;$LUCI_BRANCH" >> feeds.conf.default
          ./scripts/feeds update luci
          ls -lh feeds/luci/luci.mk

      - name: 复制插件到package目录
        run: |
          cp -r luci-app-easymesh sdk/package/
          ls -lh sdk/package/luci-app-easymesh/Makefile

      - name: 启用APK模式并校验插件识别
        working-directory: sdk
        run: |
          echo "CONFIG_USE_APK=y" >> .config
          echo "=== 生成默认配置 ==="
          make defconfig > /dev/null 2>&1
          
          echo ""
          echo "=== 插件识别结果 ==="
          if grep -q "CONFIG_PACKAGE_luci-app-easymesh=m" .config; then
            echo "✅ 插件识别成功"
          else
            echo "❌ 插件未被识别"
            grep -i easymesh .config || echo "未找到任何相关配置项"
            exit 1
          fi

      - name: 编译APK包
        working-directory: sdk
        run: |
          make package/luci-app-easymesh/compile V=s -j$(nproc)

      - name: 收集产物
        run: |
          mkdir -p output/apk
          find sdk/bin/packages -name "luci-app-easymesh*.apk" -o -name "luci-i18n-easymesh*.apk" | xargs -I {} cp {} output/apk/
          ls -lh output/apk/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-easymesh-apk-${{ env.ARCH }}
          path: output/apk/*.apk
